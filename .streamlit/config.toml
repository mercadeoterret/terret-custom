[theme]
base = "dark"
primaryColor = "#FFFFFF"
backgroundColor = "#0A0A0A"
secondaryBackgroundColor = "#111111"
textColor = "#FFFFFF"
font = "Inter:https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
headingFont = "Bebas Neue:https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap"
codeFont = "DM Mono:https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&display=swap"
borderColor = "#1E1E1E"
showWidgetBorder = false
baseRadius = "none"
buttonRadius = "2px"

[theme.sidebar]
backgroundColor = "#0D0D0D"
secondaryBackgroundColor = "#161616"

[browser]
gatherUsageStats = false

[client]
showSidebarNavigation = false
